<svg width="100%" viewBox="0 0 680 440" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
<title>Trình tự vận hành — phát hiện, cảnh báo, hủy</title>
<desc>Sơ đồ trình tự với sáu đường đời: xe, cảm biến, nhận diện và hợp nhất, máy trạng thái, bảng cảnh báo, và trung tâm điều hành. Xe dừng trong làn; cảm biến cấp dữ liệu cho khối nhận diện, khối này gửi vết xe đứng yên đến máy trạng thái; sau thời gian chờ, máy xác nhận và ra lệnh bật bảng; bảng báo trạng thái và trung tâm được thông báo bất đồng bộ. Khi còn xe, các vết liên tục đặt lại bộ đếm giữ. Khi xe rời đi và vắng quá thời gian giữ, máy trạng thái tắt bảng và thông báo trung tâm.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect x="0" y="0" width="680" height="440" fill="#FBFBF9"/>

<line x1="90" y1="88" x2="90" y2="402" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<line x1="190" y1="88" x2="190" y2="402" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<line x1="290" y1="88" x2="290" y2="402" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<line x1="390" y1="88" x2="390" y2="402" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<line x1="490" y1="88" x2="490" y2="402" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<line x1="590" y1="88" x2="590" y2="402" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>

<rect x="386" y="150" width="8" height="244" rx="2" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.6"/>

<line x1="90" y1="112" x2="190" y2="112" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="140" y="106" font-size="12" fill="#5F5E5A" text-anchor="middle">dừng trong làn</text>
<line x1="190" y1="134" x2="290" y2="134" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="240" y="128" font-size="12" fill="#5F5E5A" text-anchor="middle">khung hình + radar</text>
<line x1="290" y1="156" x2="390" y2="156" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="340" y="150" font-size="12" fill="#5F5E5A" text-anchor="middle">xe đứng yên (v≈0)</text>

<line x1="390" y1="214" x2="490" y2="214" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="440" y="208" font-size="12" fill="#5F5E5A" text-anchor="middle">bật cảnh báo</text>
<line x1="490" y1="232" x2="390" y2="232" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="440" y="226" font-size="12" fill="#5F5E5A" text-anchor="middle">trạng thái: bật</text>
<line x1="390" y1="252" x2="590" y2="252" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="492" y="246" font-size="12" fill="#5F5E5A" text-anchor="middle">sự kiện: kích hoạt</text>

<line x1="90" y1="302" x2="190" y2="302" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="140" y="296" font-size="12" fill="#5F5E5A" text-anchor="middle">rời khỏi ROI</text>

<line x1="390" y1="356" x2="490" y2="356" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="440" y="350" font-size="12" fill="#5F5E5A" text-anchor="middle">tắt</text>
<line x1="490" y1="374" x2="390" y2="374" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="440" y="368" font-size="12" fill="#5F5E5A" text-anchor="middle">trạng thái: tắt</text>
<line x1="390" y1="392" x2="590" y2="392" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="492" y="386" font-size="12" fill="#5F5E5A" text-anchor="middle">sự kiện: hủy</text>

<rect x="315" y="168" width="150" height="28" rx="4" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.6"/>
<text x="390" y="186" font-size="12" fill="#5F5E5A" text-anchor="middle">chờ 5 s → xác nhận</text>
<rect x="150" y="266" width="300" height="26" rx="4" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.6"/>
<text x="300" y="283" font-size="12" fill="#5F5E5A" text-anchor="middle">khi còn xe · đặt lại bộ đếm giữ</text>
<rect x="310" y="314" width="160" height="28" rx="4" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.6"/>
<text x="390" y="332" font-size="12" fill="#5F5E5A" text-anchor="middle">vắng 10 s → đang hủy</text>

<rect x="44" y="44" width="92" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="90" y="71" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">Xe</text>
<rect x="144" y="44" width="92" height="44" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="190" y="71" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">Cảm biến</text>
<rect x="244" y="44" width="92" height="44" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="290" y="65" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">Nhận diện</text>
<text x="290" y="80" font-size="12" fill="#185FA5" text-anchor="middle">&amp; hợp nhất</text>
<rect x="344" y="44" width="92" height="44" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="390" y="65" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">Máy</text>
<text x="390" y="80" font-size="12" fill="#185FA5" text-anchor="middle">trạng thái</text>
<rect x="444" y="44" width="92" height="44" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="490" y="65" font-size="14" font-weight="500" fill="#633806" text-anchor="middle">Bảng</text>
<text x="490" y="80" font-size="12" fill="#854F0B" text-anchor="middle">cảnh báo</text>
<rect x="544" y="44" width="92" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="590" y="65" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Trung tâm</text>
<text x="590" y="80" font-size="12" fill="#0F6E56" text-anchor="middle">điều hành</text>

<rect x="44" y="414" width="13" height="13" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="63" y="424" font-size="12" fill="#5F5E5A">biên</text>
<rect x="120" y="414" width="13" height="13" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="139" y="424" font-size="12" fill="#5F5E5A">cho tài xế</text>
<rect x="250" y="414" width="13" height="13" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="269" y="424" font-size="12" fill="#5F5E5A">trung tâm</text>
<text x="440" y="424" font-size="12" fill="#888780" text-anchor="start">- - - bất đồng bộ / phản hồi</text>
</svg>

<svg width="100%" viewBox="0 0 680 560" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
<title>Emergency stop-lane automatic warning system — architecture</title>
<desc>A roadside edge unit (sensors, perception, decision state machine, warning-sign actuator, and an independent health monitor) detects a vehicle stopped in the emergency-lane detection zone and activates an upstream warning sign placed at least the decision sight distance ahead. A non-critical traffic management center provides oversight over a store-and-forward link.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect x="0" y="0" width="680" height="540" fill="#FBFBF9"/>

<!-- BAND A: road geometry -->
<rect x="40" y="46" width="600" height="130" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 4"/>
<text x="54" y="66" font-size="14" font-weight="500" fill="#2C2C2A">Road geometry — one monitored segment</text>
<line x1="214" y1="80" x2="426" y2="80" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="320" y="76" font-size="12" fill="#5F5E5A" text-anchor="middle">traffic flow</text>

<rect x="70" y="92" width="130" height="46" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="135" y="113" font-size="14" font-weight="500" fill="#633806" text-anchor="middle">Warning sign</text>
<text x="135" y="129" font-size="12" fill="#854F0B" text-anchor="middle">VMS / LED sign</text>

<text x="320" y="108" font-size="12" fill="#5F5E5A" text-anchor="middle">≥ decision sight distance</text>
<text x="320" y="123" font-size="12" fill="#5F5E5A" text-anchor="middle">~315 m @ 100 km/h</text>
<line x1="200" y1="134" x2="440" y2="134" stroke="#5F5E5A" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<rect x="440" y="86" width="170" height="64" rx="6" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 4"/>
<text x="525" y="102" font-size="12" fill="#5F5E5A" text-anchor="middle">Detection zone (ROI)</text>
<rect x="454" y="112" width="142" height="28" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="525" y="130" font-size="12" fill="#633806" text-anchor="middle">Stopped vehicle</text>

<!-- BAND B: roadside edge unit -->
<rect x="40" y="192" width="600" height="188" rx="8" fill="none" stroke="#378ADD" stroke-width="0.8" stroke-dasharray="5 4"/>
<text x="54" y="212" font-size="14" font-weight="500" fill="#2C2C2A">Roadside unit — edge · safety-critical</text>

<rect x="58" y="236" width="118" height="54" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="117" y="258" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">Sensors</text>
<text x="117" y="275" font-size="12" fill="#185FA5" text-anchor="middle">camera + radar*</text>

<rect x="196" y="236" width="130" height="54" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="261" y="258" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">Perception</text>
<text x="261" y="275" font-size="12" fill="#185FA5" text-anchor="middle">detect in ROI</text>

<rect x="346" y="236" width="140" height="54" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="416" y="258" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">State machine</text>
<text x="416" y="275" font-size="12" fill="#185FA5" text-anchor="middle">dwell · watchdog</text>

<rect x="506" y="236" width="116" height="54" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="564" y="258" font-size="14" font-weight="500" fill="#633806" text-anchor="middle">Warning sign</text>
<text x="564" y="275" font-size="12" fill="#854F0B" text-anchor="middle">show / clear</text>

<line x1="176" y1="263" x2="196" y2="263" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="326" y1="263" x2="346" y2="263" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="486" y1="263" x2="506" y2="263" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="196" y="312" width="290" height="42" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="341" y="332" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">Health monitor</text>
<text x="341" y="348" font-size="12" fill="#185FA5" text-anchor="middle">self-test · safe state · heartbeat</text>
<line x1="212" y1="312" x2="122" y2="290" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<line x1="341" y1="312" x2="416" y2="290" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<line x1="470" y1="312" x2="560" y2="290" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>

<text x="54" y="373" font-size="12" fill="#5F5E5A">closed loop:  detect → confirm → warn → track → clear</text>

<line x1="340" y1="380" x2="340" y2="404" stroke="#5F5E5A" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text x="352" y="396" font-size="12" fill="#5F5E5A">telemetry up · config / OTA down</text>

<!-- BAND C: traffic management center -->
<rect x="40" y="404" width="600" height="92" rx="8" fill="none" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="5 4"/>
<text x="54" y="424" font-size="14" font-weight="500" fill="#2C2C2A">Traffic management center — non-critical</text>
<text x="54" y="440" font-size="12" fill="#5F5E5A">oversight only · store-and-forward · offline-tolerant</text>

<rect x="76" y="452" width="182" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="167" y="474" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Monitoring &amp; alerting</text>
<rect x="276" y="452" width="150" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="351" y="474" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Audit log</text>
<rect x="444" y="452" width="160" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="524" y="474" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Config &amp; OTA</text>

<!-- legend -->
<rect x="58" y="508" width="13" height="13" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="78" y="518" font-size="12" fill="#5F5E5A">edge · safety-critical</text>
<rect x="230" y="508" width="13" height="13" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="250" y="518" font-size="12" fill="#5F5E5A">driver-facing warning</text>
<rect x="410" y="508" width="13" height="13" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="430" y="518" font-size="12" fill="#5F5E5A">center · non-critical</text>
<line x1="20" y1="532" x2="660" y2="532" stroke="#E2E1DB" stroke-width="1"/>
<text x="20" y="547" font-size="10.5" fill="#5F5E5A">* CAMERA-ONLY build — ADR-0001 (camera+radar) rejected 2026-07-10. Radar = cấp sở design; R5 unmitigated (R20/R21).</text>
</svg>

<svg width="100%" viewBox="0 0 680 460" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
<title>Runtime sequence — detect, warn, clear</title>
<desc>A sequence diagram with six lifelines: vehicle, sensors, perception and fusion, state machine, warning sign, and traffic management center. A vehicle stops in the lane; sensors feed perception, which sends a stationary track to the state machine; after a dwell time it confirms and commands the sign on; the sign reports status and the center is notified asynchronously. While the vehicle stays, tracks keep the hold timer reset. When the vehicle departs and stays absent past the hold time, the state machine clears the sign and notifies the center.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect x="0" y="0" width="680" height="440" fill="#FBFBF9"/>

<line x1="90" y1="88" x2="90" y2="402" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<line x1="190" y1="88" x2="190" y2="402" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<line x1="290" y1="88" x2="290" y2="402" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<line x1="390" y1="88" x2="390" y2="402" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<line x1="490" y1="88" x2="490" y2="402" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<line x1="590" y1="88" x2="590" y2="402" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>

<rect x="386" y="150" width="8" height="244" rx="2" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.6"/>

<line x1="90" y1="112" x2="190" y2="112" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="140" y="106" font-size="12" fill="#5F5E5A" text-anchor="middle">enters &amp; stops in lane</text>
<line x1="190" y1="134" x2="290" y2="134" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="240" y="128" font-size="12" fill="#5F5E5A" text-anchor="middle">frames + radar returns*</text>
<line x1="290" y1="156" x2="390" y2="156" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="340" y="150" font-size="12" fill="#5F5E5A" text-anchor="middle">track in ROI · v≈0</text>

<line x1="390" y1="214" x2="490" y2="214" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="440" y="208" font-size="12" fill="#5F5E5A" text-anchor="middle">show warning</text>
<line x1="490" y1="232" x2="390" y2="232" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="440" y="226" font-size="12" fill="#5F5E5A" text-anchor="middle">status: on</text>
<line x1="390" y1="252" x2="590" y2="252" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="492" y="246" font-size="12" fill="#5F5E5A" text-anchor="middle">event: activation</text>

<line x1="90" y1="302" x2="190" y2="302" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="140" y="296" font-size="12" fill="#5F5E5A" text-anchor="middle">departs ROI</text>

<line x1="390" y1="356" x2="490" y2="356" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="440" y="350" font-size="12" fill="#5F5E5A" text-anchor="middle">clear</text>
<line x1="490" y1="374" x2="390" y2="374" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="440" y="368" font-size="12" fill="#5F5E5A" text-anchor="middle">status: off</text>
<line x1="390" y1="392" x2="590" y2="392" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="492" y="386" font-size="12" fill="#5F5E5A" text-anchor="middle">event: clear</text>

<rect x="315" y="168" width="150" height="28" rx="4" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.6"/>
<text x="390" y="186" font-size="12" fill="#5F5E5A" text-anchor="middle">dwell 5 s → confirmed</text>
<rect x="150" y="266" width="300" height="26" rx="4" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.6"/>
<text x="300" y="283" font-size="12" fill="#5F5E5A" text-anchor="middle">while present · resets the hold timer</text>
<rect x="310" y="314" width="160" height="28" rx="4" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.6"/>
<text x="390" y="332" font-size="12" fill="#5F5E5A" text-anchor="middle">absent 10 s → clearing</text>

<rect x="44" y="44" width="92" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="90" y="71" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">Vehicle</text>
<rect x="144" y="44" width="92" height="44" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="190" y="71" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">Sensors</text>
<rect x="244" y="44" width="92" height="44" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="290" y="65" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">Perception</text>
<text x="290" y="80" font-size="12" fill="#185FA5" text-anchor="middle">&amp; fusion</text>
<rect x="344" y="44" width="92" height="44" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="390" y="65" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">State</text>
<text x="390" y="80" font-size="12" fill="#185FA5" text-anchor="middle">machine</text>
<rect x="444" y="44" width="92" height="44" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="490" y="65" font-size="14" font-weight="500" fill="#633806" text-anchor="middle">Warning</text>
<text x="490" y="80" font-size="12" fill="#854F0B" text-anchor="middle">sign</text>
<rect x="544" y="44" width="92" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="590" y="71" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">TMC</text>

<rect x="44" y="414" width="13" height="13" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="63" y="424" font-size="12" fill="#5F5E5A">edge</text>
<rect x="120" y="414" width="13" height="13" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="139" y="424" font-size="12" fill="#5F5E5A">driver-facing</text>
<rect x="250" y="414" width="13" height="13" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="269" y="424" font-size="12" fill="#5F5E5A">center</text>
<text x="470" y="424" font-size="12" fill="#888780" text-anchor="start">- - - async / return</text>
<line x1="20" y1="434" x2="660" y2="434" stroke="#E2E1DB" stroke-width="1"/>
<text x="20" y="449" font-size="10.5" fill="#5F5E5A">* CAMERA-ONLY build — ADR-0001 (camera+radar) rejected 2026-07-10. Radar = cấp sở design; R5 unmitigated (R20/R21).</text>
</svg>

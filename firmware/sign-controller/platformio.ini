; ESW IF-4 sign-controller firmware (doc 10 scaffold) -- PlatformIO project.
;
; Build:    python -m platformio run
; Flash:    python -m platformio run -t upload        (add --upload-port COMx if needed)
; Monitor:  python -m platformio device monitor -b 115200
; (Use `pio` directly if %APPDATA%\Python\Python312\Scripts is on PATH.)

[platformio]
default_envs = yolouno

; OhStem Yolo:UNO -- ESP32-S3 N16R8 (16 MB QIO flash + 8 MB OPI PSRAM), NATIVE USB
; (0x303A:0x1001, no UART bridge). There is no YoloUno entry in the PlatformIO
; registry, so boards/esp32s3-n16r8.json mirrors OhStem's own board definition
; (github.com/ohstem-public/coreiot-client-sdk, examples/PlatformIO-Arduino).
; Pins per OhStem's pins_arduino.h: onboard D13 LED = GPIO48 (the zero-wiring
; bench "sign"; NOTE it shares SCK -- move the sign drive to a Grove pin, e.g.
; D2 = GPIO5, once the LoRa SX1276 takes the SPI bus), onboard RGB pixel = GPIO45.
[env:yolouno]
platform = espressif32 @ 7.0.1
board = esp32s3-n16r8
framework = arduino
monitor_speed = 115200
build_flags =
    -DESW_SIGN_GPIO=48
    -DESW_NEOPIXEL_PIN=45

; Any generic ESP32-S3 devkit (bench work while the YoloUno boards are with the
; hardware team): identical firmware; devkit RGB pixel is usually GPIO48.
[env:esp32s3-devkit]
platform = espressif32 @ 7.0.1
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DESW_SIGN_GPIO=2
    -DESW_NEOPIXEL_PIN=48
